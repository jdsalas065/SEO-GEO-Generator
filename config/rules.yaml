llm:
  provider: anthropic
  model: claude-sonnet-4-6                        # alias luôn trỏ đến Sonnet mới nhất
  temperature: 0.7
  max_tokens: 4096
  api_key_env: ANTHROPIC_API_KEY

  steps:
    outline:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"          # ✅ thay thế haiku cũ
      max_tokens: 1400
      temperature: 0.3
      api_key_env: ANTHROPIC_API_KEY

    write:
      provider: "anthropic"
      model: "claude-sonnet-4-6"                  # hoặc claude-sonnet-4-5-20250929
      max_tokens: 4096
      temperature: 0.7
      api_key_env: ANTHROPIC_API_KEY

    seo_check:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"          # ✅ thay thế haiku cũ
      max_tokens: 600
      temperature: 0.2
      api_key_env: ANTHROPIC_API_KEY


seo:
  min_word_count: 800
  max_word_count: 1500
  tone: informative              # informative | conversational | authoritative
  language: vi                   # Vietnamese
  required_headings:
    - h2: at_least_2
    - h3: at_least_3
  meta_description_max_length: 160
  keyword_density_min: 0.01      # 1%
  keyword_density_max: 0.03      # 3%

geo:
  eeat_level: basic           # basic | ymyl (YMYL = y tế, tài chính, pháp lý)
  snippet_position: top       # đoạn GEO snippet đặt đầu bài
  reader_awareness: true      # bật detect tầng nhận thức trong outline
  geo_principles:
    - answer_first            # trả lời thẳng trước, giải thích sau
    - real_examples           # ví dụ thật, case study thật
    - semantic_over_keyword   # tối ưu ngữ nghĩa, không nhồi từ khoá
    - entity_building         # đề cập thương hiệu/tác giả rõ ràng
    - short_paragraphs        # đoạn 2–4 câu, tránh tường chữ
  target_country: VN
  locale: vi-VN
  local_entities: true           # include local business / place names when relevant
  currency: VND
  date_format: dd/MM/yyyy

content:
  include_faq: true
  faq_count: 5
  include_sources: false
  markdown_output: true

validation:
  min_word_count: 600            # hard minimum before rejecting
  required_sections:
    - title
    - introduction
    - conclusion
